<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/2cd34b61aa.js" crossorigin="anonymous"></script>
    <title>Formula 1</title>
</head>
<body>

    <h1>F1 Drivers</h1>
    
    <header class="sticky-top">
        <div class="selectors">
            <div class="years">
                <select id="yearSelector">
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025">2025</option>
                    <option value="2026">2026</option>
                </select>
            </div>
            <div class="races">
                <select id="raceSelector">
                    <option value="Australia">Australia</option>
                    <option value="China">China</option>
                    <option value="Japan">Japon</option>
                    <option disabled class="cancelled" value="Bahrein">Bahrein 🚫</option>
                    <option disabled class="cancelled" value="Jeddah">Jeddah 🚫</option>
                    <option disabled value="Miami">Miami</option>
                    <option disabled value="Canada">Canada</option>
                    <option disabled value="Monaco">Mónaco</option>
                    <option disabled value="Barcelona">Barcelona</option>
                    <option disabled value="Austria">Austria</option>
                    <option disabled value="England">Gran Bretaña</option>
                    <option disabled value="Belgium">Bélgica</option>
                    <option disabled value="Hungary">Hungría</option>
                    <option disabled value="Netherlands">Países Bajos</option>
                    <option disabled value="Monza">Monza</option>
                    <option disabled value="Madrid">Madrid</option>
                    <option disabled value="Azebaiyan">Baku</option>
                    <option disabled value="Singapur">Singapur</option>
                    <option disabled value="UnitedStates">USA</option>
                    <option disabled value="Mexico">México</option>
                    <option disabled value="Brasil">Brasil</option>
                    <option disabled value="LasVegas">Las Vegas</option>
                    <option disabled value="Catar">Catar</option>
                    <option disabled value="AbuDabi">Abu Dabi</option>
                </select>
            </div>
            <button id="toFavs"> -->⭐ </button>
        </div>
    </header>

    <div class="loader"></div>

    <div class="teams">

    </div>

    

<div class="container">
</div>
    
    <script src="js/main.js"></script>
</body>
</html>
